# Render blueprint — deploys the Reviews app (Docker web service) + a Postgres DB.
# Docs: https://render.com/docs/blueprint-spec
#
# After first deploy, set the sync:false env vars in the Render dashboard, then set
# SHOPIFY_APP_URL + GOOGLE_REDIRECT_URI to the assigned onrender.com URL and redeploy.
# See DEPLOY-RENDER.md for the full walkthrough.

databases:
  - name: artiksha-reviews-db
    plan: free
    databaseName: artiksha_reviews
    user: artiksha

services:
  - type: web
    name: artiksha-reviews
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: artiksha-reviews-db
          property: connectionString
      - key: SCOPES
        value: read_products
      # --- set these in the Render dashboard (Environment tab) ---
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL # e.g. https://artiksha-reviews.onrender.com (set after 1st deploy)
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI # https://<app-url>/auth/google/callback
        sync: false
